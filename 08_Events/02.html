<body style="background-color: rgb(96, 90, 90);">
  <h1>
    Chai aur code
  </h1>
  <button id = "stop" style="background-color: rgb(194, 46, 23);">stop</button>
</body>
<script>
  const sayHimanshu = function(){

  }

  const changeText = function(){
    document.querySelector('h1').innerHTML = "best js hai"
  }

  const changeMe = setTimeout(changeText,2000)

  })

  setTimeout(changeText, 2000)
</script>
